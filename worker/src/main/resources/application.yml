spring:
  application:
    name: notifi-worker
  jackson:
    serialization:
      write-dates-as-timestamps: false
  rabbitmq:
    addresses: ${RABBIT_URL:amqp://guest:guest@localhost:5672}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/notifi}
    username: ${DATABASE_USERNAME:notifi}
    password: ${DATABASE_PASSWORD:notifi}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        send_latency_seconds: true
        send_failure_seconds: true

worker:
  scheduler:
    scan-interval-ms: ${SCHEDULER_SCAN_INTERVAL_MS:5000}
    batch-size: ${SCHEDULER_BATCH_SIZE:100}
  consumer:
    prefetch: ${WORKER_PREFETCH:20}
    concurrency: ${WORKER_CONCURRENCY:2}
  retry:
    max-attempts: ${WORKER_MAX_ATTEMPTS:3}
  webhook:
    default-url: ${WEBHOOK_DEFAULT_URL:}
    secret: ${WEBHOOK_SECRET:}

logging:
  level:
    root: INFO
  pattern:
    console: '%msg%n'
