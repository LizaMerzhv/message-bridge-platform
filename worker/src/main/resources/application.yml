spring:
  application:
    name: notifi-worker
  jackson:
    serialization:
      write-dates-as-timestamps: false
  rabbitmq:
    addresses: ${WORKER_RABBIT_URL:amqp://guest:guest@localhost:5672}
  datasource:
    url: ${WORKER_DB_URL:jdbc:postgresql://localhost:5443/notifi_worker}
    username: ${WORKER_DB_USER:notifi_worker}
    password: ${WORKER_DB_PASSWORD:notifi_worker}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: ${WORKER_DB_SCHEMA:public}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${WORKER_DB_SCHEMA:public}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        send_latency_seconds: true
        send_failure_seconds: true

worker:
  scheduler:
    scan-interval-ms: ${SCHEDULER_SCAN_INTERVAL_MS:5000}
    batch-size: ${SCHEDULER_BATCH_SIZE:100}
  consumer:
    prefetch: ${WORKER_PREFETCH:20}
    concurrency: ${WORKER_CONCURRENCY:2}
  retry:
    max-attempts: ${WORKER_MAX_ATTEMPTS:3}
  webhook:
    default-url: ${WEBHOOK_DEFAULT_URL:}
    secret: ${WEBHOOK_SECRET:}
  api:
    internal:
      base-url: ${API_INTERNAL_BASE_URL:http://localhost:8080}
      shared-secret: ${API_INTERNAL_SHARED_SECRET:notifi-internal-dev-secret}

notifi:
  amqp:
    exchange: ${WORKER_AMQP_EXCHANGE:notifi.exchange}
    dlx: ${WORKER_AMQP_DLX:notifi.dlx}
    ingest-queue: ${WORKER_AMQP_INGEST_QUEUE:notify.ingest}
    tasks-queue: ${WORKER_AMQP_TASKS_QUEUE:notify.tasks}
    retry-queue: ${WORKER_AMQP_RETRY_QUEUE:notify.retry}
    dlq: ${WORKER_AMQP_DLQ:notify.dlq}
    ingest-routing-key: ${WORKER_AMQP_INGEST_ROUTING_KEY:ingest}
    tasks-routing-key: ${WORKER_AMQP_TASKS_ROUTING_KEY:tasks}
    retry-routing-key: ${WORKER_AMQP_RETRY_ROUTING_KEY:retry}
    dlq-routing-key: ${WORKER_AMQP_DLQ_ROUTING_KEY:dlq}

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.springframework: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: '%msg%n'
