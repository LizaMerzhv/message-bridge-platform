<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/layout :: layout('Create notification', 'notifications', ~{::content})}">
    <section class="space-y-6 max-w-2xl">
        <h1 class="text-2xl font-semibold text-sky-300">Create notification</h1>

        <div th:if="${problem != null}" class="rounded border border-rose-500 bg-rose-500/10 p-4 text-sm text-rose-300">
            <div class="font-semibold" th:text="${problem.title}">Error</div>
            <div th:if="${problem.detail != null}" th:text="${problem.detail}"></div>
        </div>

        <form method="post" action="/notifications" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-300 mb-1">Recipient</label>
                <input name="recipient" type="email" required
                       class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2 text-sm text-slate-100 placeholder-slate-500"
                       placeholder="user@example.com"
                       th:value="${form != null ? form.recipient : ''}" />
            </div>

            <div>
                <label class="block text-sm text-slate-300 mb-1">Subject</label>
                <input name="subject" type="text"
                       class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2 text-sm text-slate-100 placeholder-slate-500"
                       placeholder="Subject"
                       th:value="${form != null ? form.subject : ''}" />
            </div>

            <div>
                <label class="block text-sm text-slate-300 mb-1">Body</label>
                <textarea name="body" rows="6"
                          class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2 text-sm text-slate-100 placeholder-slate-500"
                          placeholder="Message text... "
                          th:text="${form != null ? form.body : ''}"></textarea>
            </div>

            <div class="pt-2">
                <button type="submit"
                        class="inline-flex items-center justify-center rounded-md bg-sky-500 px-4 py-2 text-sm font-medium text-slate-900 hover:bg-sky-400">
                    Send
                </button>
                <a href="/notifications" class="ml-3 text-sm text-slate-400 hover:text-slate-200">Cancel</a>
            </div>
        </form>
    </section>
</th:block>
</html>
