<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">Admin UI</title>
</head>
<body class="bg-slate-950 text-slate-200">
<header class="border-b border-slate-800">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
        <a href="/" class="text-sky-300 font-semibold">Notification Admin</a>
        <nav class="space-x-6 text-sm">
            <a href="/notifications"
               class="hover:text-sky-300"
               th:classappend="${active}=='notifications' ? ' text-sky-300' : ''">Notifications</a>
            <a href="/templates"
               class="hover:text-sky-300"
               th:classappend="${active}=='templates' ? ' text-sky-300' : ''">Templates</a>
        </nav>
    </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-8">
    <th:block th:insert="${content}"></th:block>
</main>

<footer class="mx-auto max-w-6xl px-4 py-8 text-xs text-slate-500">
    <span>&copy;</span> <span th:text="${#temporals.format(#dates.createNow(), 'yyyy')}">2025</span>
</footer>
</body>
</html>

<th:block th:fragment="layout(title, active, content)"></th:block>
