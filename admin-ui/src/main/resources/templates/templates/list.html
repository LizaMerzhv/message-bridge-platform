<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/layout :: layout('Templates', 'templates', ~{::content})}">
    <section class="space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-sky-300">Templates</h1>
                <p class="text-sm text-slate-400">Manage reusable message blueprints.</p>
            </div>
            <a href="/templates/create"
               class="inline-flex items-center justify-center rounded-md bg-sky-500 px-4 py-2 text-sm font-medium text-slate-900 hover:bg-sky-400">
                Create template
            </a>
        </div>
        <div id="templates-table" th:fragment="table">
            <div class="overflow-x-auto rounded-lg border border-slate-800 bg-slate-900/40">
                <table class="min-w-full divide-y divide-slate-800 text-sm">
                    <thead class="bg-slate-900/70 text-xs uppercase tracking-wide text-slate-400">
                    <tr>
                        <th class="px-4 py-3 text-left">Code</th>
                        <th class="px-4 py-3 text-left">Status</th>
                        <th class="px-4 py-3 text-left">Created at</th>
                        <th class="px-4 py-3 text-left"></th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800" th:if="${page != null && page.hasContent()}">
                    <tr th:each="template : ${page.content}" class="hover:bg-slate-800/40">
                        <td class="px-4 py-3 font-mono text-xs text-sky-300">
                            <a th:href="@{'/templates/' + ${template.code}}" th:text="${template.code}">code</a>
                        </td>
                        <td class="px-4 py-3">
                            <span class="rounded bg-slate-800 px-2 py-1 text-xs" th:text="${template.status}">ACTIVE</span>
                        </td>
                        <td class="px-4 py-3"
                            th:text="${template.createdAt != null ? #temporals.format(template.createdAt, 'yyyy-MM-dd''T''HH:mm:ss''Z''') : '—'}">—</td>
                        <td class="px-4 py-3 text-right">
                            <form th:action="@{'/templates/' + ${template.code} + '/deactivate'}" method="post"
                                  th:if="${template.status == 'ACTIVE'}" class="inline">
                                <button type="submit"
                                        class="rounded border border-rose-500 px-3 py-1 text-xs text-rose-300 hover:bg-rose-500/10">
                                    Deactivate
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                    <tbody th:if="${page == null || !page.hasContent()}">
                    <tr>
                        <td colspan="4" class="px-4 py-6 text-center text-sm text-slate-400">No templates found</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</th:block>
</html>
