<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="fragments/layout :: layout('Template detail', ~{::content})">
    <section class="space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-sky-300">Template</h1>
                <p class="text-sm text-slate-400">Rendered content snapshot.</p>
            </div>
            <a href="/templates" class="text-sm text-sky-400 hover:text-sky-200">Back to list</a>
        </div>
        <div th:if="${template}" class="space-y-4">
            <div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4">
                <div class="flex items-center justify-between text-sm">
                    <span class="font-mono text-xs text-sky-300" th:text="${template.code}"></span>
                    <span class="rounded bg-slate-800 px-2 py-1 text-xs" th:text="${template.status}"></span>
                </div>
                <div class="mt-3 grid gap-3 md:grid-cols-2 text-sm">
                    <div>
                        <span class="text-slate-400">Created at</span>
                        <div th:text="${template.createdAt != null ? #temporals.format(template.createdAt, 'yyyy-MM-dd''T''HH:mm:ss''Z''') : '—'}"></div>
                    </div>
                    <div>
                        <span class="text-slate-400">Updated at</span>
                        <div th:text="${template.updatedAt != null ? #temporals.format(template.updatedAt, 'yyyy-MM-dd''T''HH:mm:ss''Z''') : '—'}"></div>
                    </div>
                </div>
            </div>
            <div class="grid gap-4 md:grid-cols-2">
                <div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4">
                    <h2 class="text-sm font-semibold text-sky-200">Subject</h2>
                    <p class="mt-2 text-sm" th:text="${template.subject}"></p>
                </div>
                <div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4">
                    <h2 class="text-sm font-semibold text-sky-200">Text body</h2>
                    <pre class="mt-2 overflow-x-auto whitespace-pre-wrap text-sm" th:text="${template.bodyText}"></pre>
                </div>
            </div>
            <div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4">
                <h2 class="text-sm font-semibold text-sky-200">HTML body</h2>
                <div class="prose prose-invert max-w-none" th:utext="${template.bodyHtml}"></div>
            </div>
        </div>
    </section>
</th:block>
</html>
