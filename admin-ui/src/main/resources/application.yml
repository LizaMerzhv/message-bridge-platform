server:
  port: 8089
spring:
  thymeleaf:
    cache: false
notifi:
  api:
    base-url: ${NOTIFI_API_BASE_URL:http://localhost:8080}
    username: ${NOTIFI_API_USERNAME:admin}
    password: ${NOTIFI_API_PASSWORD:admin}
    client-id: ${NOTIFI_API_CLIENT_ID:00000000-0000-0000-0000-000000000001}
    connect-timeout-ms: 3000
    read-timeout-ms: 7000
