<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8" />
    <title th:text="${title}">Notifi Admin</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --primary: #2563eb;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header.topbar {
            background: #0f172a;
            color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
        }

        header .brand {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        nav .nav-link {
            color: #cbd5e1;
            margin-right: 18px;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 6px;
        }

        nav .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-weight: 600;
        }

        .logout-form {
            margin: 0;
        }

        .logout-button {
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        main.container {
            padding: 28px;
        }

        h1 {
            margin: 0 0 12px;
        }

        h2 {
            margin: 0 0 10px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            background: #f9fafb;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
            color: #374151;
        }

        a.button,
        button,
        .btn-secondary {
            display: inline-block;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            background: #0ea5e9;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        form.inline-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        form.inline-form label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        form.inline-form input,
        form.inline-form select,
        form.inline-form textarea {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            min-width: 180px;
            font-size: 14px;
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .tag {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            background: #e0f2fe;
            color: #075985;
        }

        .tag.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .tag.success {
            background: #dcfce7;
            color: #166534;
        }

        .field-error {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 4px;
        }

        .timeline {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .timeline li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .timeline li:last-child {
            border-bottom: none;
        }

        .timeline .status {
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .pagination a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="topbar">
    <div class="brand">Notifi Admin</div>
    <nav>
        <a class="nav-link"
           th:classappend="${activePage} == 'notifications' ? ' active' : ''"
           th:href="@{/admin/ui/notifications}">Notifications</a>
        <a class="nav-link"
           th:classappend="${activePage} == 'templates' ? ' active' : ''"
           th:href="@{/admin/ui/templates}">Templates</a>
    </nav>
</header>

<main class="container" th:insert="${content}"></main>
</body>
</html>
