<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New template</title>
</head>
<body>
<div th:replace="admin/layout :: layout('New template', ~{::section})">
    <section class="card">
        <div class="flex-between">
            <h1>Create template</h1>
            <a class="btn-secondary" th:href="@{/admin/ui/templates}">Back to list</a>
        </div>
        <form th:action="@{/admin/ui/templates}" th:object="${templateForm}" method="post" class="grid"
              style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-top: 12px;">
            <div>
                <label>Code</label>
                <input type="text" th:field="*{code}" placeholder="WELCOME"/>
                <div class="field-error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
            </div>
            <div>
                <label>Subject</label>
                <input type="text" th:field="*{subject}" placeholder="Welcome email"/>
                <div class="field-error" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"></div>
            </div>
            <div style="grid-column: 1 / -1;">
                <label>Body (HTML)</label>
                <textarea rows="6" th:field="*{bodyHtml}"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('bodyHtml')}" th:errors="*{bodyHtml}"></div>
            </div>
            <div style="grid-column: 1 / -1;">
                <label>Body (Text)</label>
                <textarea rows="6" th:field="*{bodyText}"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('bodyText')}" th:errors="*{bodyText}"></div>
            </div>
            <div style="grid-column: 1 / -1;">
                <button type="submit">Create</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
