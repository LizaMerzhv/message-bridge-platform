<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Template detail</title>
</head>
<body>
<div th:replace="admin/layout :: layout('Template detail', ~{::section})">
    <section class="grid">
        <div class="card">
            <div class="flex-between">
                <h1 th:text="${template.code}">CODE</h1>
                <a class="btn-secondary" th:href="@{/admin/ui/templates}">Back to templates</a>
            </div>
            <p class="muted" th:text="${template.subject}">Subject</p>
            <div class="grid" style="margin-top: 12px;">
                <div>
                    <div class="muted">Status</div>
                    <div class="tag"
                         th:classappend="${template.status} == 'ACTIVE' ? ' success' : ' danger'"
                         th:text="${template.status}">ACTIVE
                    </div>
                </div>
                <div>
                    <div class="muted">Created</div>
                    <div th:text="${#temporals.format(template.createdAt, 'yyyy-MM-dd HH:mm')}">created</div>
                </div>
                <div>
                    <div class="muted">Updated</div>
                    <div th:text="${template.updatedAt != null ? #temporals.format(template.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">
                        updated
                    </div>
                </div>
            </div>
            <div style="margin-top: 14px;" class="actions">
                <form th:action="@{'/admin/ui/templates/' + ${template.code} + '/deactivate'}" method="post">
                    <button type="submit"
                            th:disabled="${template.status} == 'INACTIVE'">
                        Deactivate
                    </button>
                </form>
            </div>
        </div>
        <div class="card">
            <h2>Body (HTML)</h2>
            <pre class="muted" style="white-space: pre-wrap;">[[${template.bodyHtml}]]</pre>
            <h2>Body (Text)</h2>
            <pre class="muted" style="white-space: pre-wrap;">[[${template.bodyText}]]</pre>
        </div>
    </section>
</div>
</body>
</html>
