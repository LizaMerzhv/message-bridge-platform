<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${template.code} + ' • Template'">Template</title>
    <style>
        body { font-family: "Inter", Arial, sans-serif; margin: 0; background: #f4f5f7; }
        header { background: #111827; color: #f9fafb; padding: 16px 32px; }
        nav a { color: #d1d5db; margin-right: 16px; text-decoration: none; font-size: 14px; }
        nav a.active { color: #fff; font-weight: 600; }
        main { padding: 32px; }
        .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        pre { background: #f3f4f6; padding: 16px; border-radius: 8px; overflow-x: auto; }
        .alert { background: #dcfce7; border: 1px solid #22c55e; padding: 12px 16px; color: #166534; border-radius: 6px; margin-bottom: 16px; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <h1>Notifi Admin</h1>
    <nav>
        <a th:href="@{/admin/ui/templates}" class="active">Templates</a>
        <a th:href="@{/admin/ui/notifications}">Notifications</a>
    </nav>
</header>
<main>
    <a th:href="@{/admin/ui/templates}">&larr; Back to templates</a>
    <div class="card">
        <div th:if="${created}" class="alert">Template was created successfully.</div>
        <div class="field">
            <label>Code</label>
            <div th:text="${template.code}">WELCOME</div>
        </div>
        <div class="field">
            <label>Subject</label>
            <div th:text="${template.subject}">Welcome</div>
        </div>
        <div class="field">
            <label>Status</label>
            <div th:text="${template.status}">ACTIVE</div>
        </div>
        <div class="field">
            <label>HTML body</label>
            <pre th:text="${template.bodyHtml}"></pre>
        </div>
        <div class="field">
            <label>Text body</label>
            <pre th:text="${template.bodyText}"></pre>
        </div>
        <div class="field">
            <label>Created</label>
            <div th:text="${#temporals.format(template.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</div>
        </div>
    </div>
</main>
</body>
</html>
