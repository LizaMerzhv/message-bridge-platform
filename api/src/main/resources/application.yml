spring:
  datasource:
    url: ${API_DB_URL:jdbc:postgresql://localhost:5442/notifi_api} # dedicated API database endpoint
    username: ${API_DB_USER:notifi_api} # isolated API database user
    password: ${API_DB_PASSWORD:notifi_api} # isolated API database password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        globally_quoted_identifiers: true
        default_schema: ${API_DB_SCHEMA:public} # enforce schema per service
  flyway:
    enabled: true
    locations: classpath:db/migration # service-local migrations
    default-schema: ${API_DB_SCHEMA:public}
    placeholders:
      demoApiKey: ${NOTIFI_DEMO_API_KEY:demo-123}
  rabbitmq:
    addresses: ${API_RABBIT_URL:amqp://guest:guest@localhost:5672} # RabbitMQ connection for event publishing
  jackson:
    time-zone: UTC
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
logging:
  level:
    root: INFO
    com.example.notifi: DEBUG
    org.springframework.web: DEBUG
    org.springframework.validation: DEBUG
pattern:
  level: "%5p [traceId=%X{traceId:-},spanId=%X{spanId:-}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
notifi:
  amqp:
    exchange: ${API_AMQP_EXCHANGE:notifi.exchange} # shared direct exchange name
    ingest-routing-key: ${API_AMQP_INGEST_ROUTING_KEY:ingest} # routing key that targets worker ingestion queue
  gateway:
    shared-secret: ${API_GATEWAY_SHARED_SECRET:notifi-gateway-dev-secret}
  internal:
    shared-secret: ${API_INTERNAL_SHARED_SECRET:notifi-internal-dev-secret}
