version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: notifi
      POSTGRES_USER: ${DB_USER:-notifi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notifi}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notifi} -d notifi"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.12-management
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    ports: ["8025:8025", "1025:1025"]

  webhook-catcher:
    image: mendhak/http-https-echo:32
    environment:
      - HTTP_PORT=8080
    ports: ["8080:8080"]