version: "3.9"

services:
  postgres-api:
    image: postgres:15
    environment:
      POSTGRES_DB: notifi_api
      POSTGRES_USER: ${API_DB_USER:-notifi_api}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD:-notifi_api}
    ports: ["5442:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${API_DB_USER:-notifi_api} -d notifi_api"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-worker:
    image: postgres:15
    environment:
      POSTGRES_DB: notifi_worker
      POSTGRES_USER: ${WORKER_DB_USER:-notifi_worker}
      POSTGRES_PASSWORD: ${WORKER_DB_PASSWORD:-notifi_worker}
    ports: ["5443:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WORKER_DB_USER:-notifi_worker} -d notifi_worker"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit loopback_users []"
    ports: ["5672:5672", "15672:15672"]

  mailhog:
    image: mailhog/mailhog:latest
    ports: ["8025:8025", "1025:1025"]

  devbox:
    image: curlimages/curl:8.10.1
    tty: true
    stdin_open: true
    depends_on:
      api:
        condition: service_healthy
    entrypoint: [ "sh","-lc","apk add --no-cache jq >/dev/null 2>&1 || true; sleep infinity" ]

  swagger:
    image: swaggerapi/swagger-ui:v5.17.14
    environment:
      SWAGGER_JSON: http://api:8080/v3/api-docs
    ports:
       - "8082:8080"
    depends_on:
       api:
        condition: service_healthy


  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      API_DB_URL: jdbc:postgresql://postgres-api:5432/notifi_api
      API_DB_USER: ${API_DB_USER:-notifi_api}
      API_DB_PASSWORD: ${API_DB_PASSWORD:-notifi_api}
      API_DB_SCHEMA: ${API_DB_SCHEMA:-public}
      API_RABBIT_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      API_AMQP_EXCHANGE: ${API_AMQP_EXCHANGE:-notifi.exchange}
      API_AMQP_INGEST_ROUTING_KEY: ${API_AMQP_INGEST_ROUTING_KEY:-ingest}
      SERVER_PORT: 8080
    depends_on:
      - postgres-api
      - rabbitmq
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      WORKER_DB_URL: jdbc:postgresql://postgres-worker:5432/notifi_worker
      WORKER_DB_USER: ${WORKER_DB_USER:-notifi_worker}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:-notifi_worker}
      WORKER_DB_SCHEMA: ${WORKER_DB_SCHEMA:-public}
      WORKER_RABBIT_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      API_INTERNAL_BASE_URL: http://api:8080
      SERVER_PORT: 8080
    depends_on:
      - postgres-worker
      - rabbitmq
      - mailhog
    ports:
      - "${WORKER_PORT:-8081}:8080"
