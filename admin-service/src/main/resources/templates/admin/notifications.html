<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
</head>
<body>
<div th:replace="admin/layout :: layout('Notifications', ~{::section})">
    <section>
        <div class="flex-between">
            <div>
                <h1>Notifications</h1>
                <p class="muted" th:text="${page.totalElements} + ' notifications'">0 notifications</p>
            </div>
            <a class="button" th:href="@{/admin/ui/notifications/new}">New notification</a>
        </div>

        <form class="inline-form" method="get" th:action="@{/admin/ui/notifications}">
            <div>
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="" th:selected="${statusFilter == null || statusFilter.isEmpty()}">Any</option>
                    <option th:each="status : ${availableStatuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${statusFilter != null and statusFilter.equalsIgnoreCase(status.name())}"></option>
                </select>
            </div>
            <div>
                <label for="clientId">Client ID</label>
                <input id="clientId" name="clientId" type="text" placeholder="UUID" th:value="${clientFilter}"/>
            </div>
            <div>
                <button type="submit">Apply filters</button>
            </div>
        </form>

        <div class="grid" style="margin-bottom: 16px;">
            <div class="card">
                <div class="muted">Filtered total</div>
                <div style="font-size: 22px; font-weight: 700;" th:text="${page.totalElements}">0</div>
            </div>
            <div class="card">
                <div class="muted">Sent</div>
                <div style="font-size: 22px; font-weight: 700;" th:text="${sentCount}">0</div>
            </div>
            <div class="card">
                <div class="muted">Failed</div>
                <div style="font-size: 22px; font-weight: 700;" th:text="${failedCount}">0</div>
            </div>
            <div class="card">
                <div class="muted">Success vs Failed</div>
                <canvas id="statusChart" width="200" height="200"></canvas>
                <div id="chart-data" th:attr="data-sent=${sentCount},data-failed=${failedCount}"></div>
                <!-- Chart.js reads sent/failed counts from the data attributes above that the controller sets -->
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Client</th>
                    <th>Channel</th>
                    <th>To</th>
                    <th>Subject/Template</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Send Effective</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="notification : ${page.content}">
                    <td>
                        <a th:href="@{'/admin/ui/notifications/' + ${notification.id}}"
                           th:text="${#strings.substring(notification.id.toString(),0,8)} + '…'">id</a>
                    </td>
                    <td th:text="${notification.clientId}">client</td>
                    <td th:text="${notification.channel}">EMAIL</td>
                    <td th:text="${notification.to}">user@example.com</td>
                    <td>
                        <span th:text="${notification.subject != null ? notification.subject : notification.templateCode}">Subject</span>
                    </td>
                    <td><span class="tag" th:text="${notification.status}">STATUS</span></td>
                    <td th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}">created</td>
                    <td th:text="${notification.sendAtEffective != null ? #temporals.format(notification.sendAtEffective, 'yyyy-MM-dd HH:mm') : '-'}">
                        send
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(page.content)}">
                    <td colspan="8">No notifications found.</td>
                </tr>
                </tbody>
            </table>
            <div class="pagination">
                <a th:if="${page.hasPrevious()}"
                   th:href="@{/admin/ui/notifications(status=${statusFilter}, clientId=${clientFilter}, page=${page.number - 1}, size=${page.size})}">Previous</a>
                <span>Page <span th:text="${page.number + 1}"></span> of <span
                        th:text="${page.totalPages == 0 ? 1 : page.totalPages}"></span></span>
                <a th:if="${page.hasNext()}"
                   th:href="@{/admin/ui/notifications(status=${statusFilter}, clientId=${clientFilter}, page=${page.number + 1}, size=${page.size})}">Next</a>
            </div>
        </div>
    </section>
</div>
<script>
    (function () {
        const dataHolder = document.getElementById('chart-data');
        if (!dataHolder) {
            return;
        }
        const sent = Number(dataHolder.dataset.sent || '0');
        const failed = Number(dataHolder.dataset.failed || '0');
        const ctx = document.getElementById('statusChart');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Sent', 'Failed'],
                datasets: [{
                    data: [sent, failed],
                    backgroundColor: ['#22c55e', '#f87171']
                }]
            },
            options: {plugins: {legend: {position: 'bottom'}}}
        });
    })();
</script>
</body>
</html>
