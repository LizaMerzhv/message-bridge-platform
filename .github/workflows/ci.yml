name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build with Maven Wrapper
        run: ./mvnw -B -ntp verify -Pcoverage-enforce

      - name: Upload JaCoCo aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate
          path: target/site/jacoco-aggregate/**

      - name: Upload Spotless reports
        uses: actions/upload-artifact@v4
        with:
          name: spotless-reports
          path: '**/target/spotless/**'
