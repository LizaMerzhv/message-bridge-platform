spring:
  datasource:
    url: ${SECURITY_DB_URL:jdbc:postgresql://localhost:5444/notifi_security}
    username: ${SECURITY_DB_USER:notifi_security}
    password: ${SECURITY_DB_PASSWORD:notifi_security}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        globally_quoted_identifiers: true
        default_schema: ${SECURITY_DB_SCHEMA:public}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${SECURITY_DB_SCHEMA:public}
    placeholders:
      demoApiKey: ${NOTIFI_DEMO_API_KEY:demo-123}
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
